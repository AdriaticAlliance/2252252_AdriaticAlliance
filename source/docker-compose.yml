
version: "3.9"

services:
  # Apache Kafka broker used as the message backbone for downstream components.
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: mars-kafka
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LOG_DIRS=/tmp/kraft-combined-logs
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
    ports:
      # Expose Kafka for local development and for non-containerised consumers.
      - "9092:9092"
    healthcheck:
      test: ["CMD", "bash", "-c", "kafka-topics --bootstrap-server kafka:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
    networks:
      - mars-net

  # Gate component: talks to the simulator and forwards raw data to the
  # interpreter via Kafka.
  ingestion-gate:
    build:
      context: ./ingestion-service/gate
      dockerfile: Dockerfile
    container_name: mars-ingestion-gate
    depends_on:
      - kafka
      - simulator
    environment:
      - NODE_ENV=production

      # Simulator configuration
      # By default, talk to the simulator container at http://simulator:8080.
      # Override this if the simulator is running on the host.
      - SIMULATOR_BASE_URL=http://simulator:8080

      # Kafka connectivity (gate produces interpret_* and consumes poll_sensor_*).
      - KAFKA_BROKER=kafka:9092
      - KAFKA_CLIENT_ID=mars-gate

      # Optional polling configuration and telemetry topics.
      - SENSOR_POLL_INTERVAL_MS=5000
      - TELEMETRY_TOPICS=mars/telemetry/airlock,mars/telemetry/life_support,mars/telemetry/power_bus,mars/telemetry/power_consumption,mars/telemetry/radiation,mars/telemetry/solar_array,mars/telemetry/thermal_loop
    ports:
      # Optional: expose an HTTP port (health/metrics) for the gate.
      - "3001:3001"
    networks:
      - mars-net

  # Interpreter component: consumes raw topics, converts to the common
  # data record format and republishes on a normalised topic.
  ingestion-interpreter:
    build:
      context: ./ingestion-service/interpreter
      dockerfile: Dockerfile
    container_name: mars-ingestion-interpreter
    depends_on:
      - kafka
    environment:
      - NODE_ENV=production

      # Kafka connectivity
      - KAFKA_BROKER=kafka:9092
      - KAFKA_CLIENT_ID=mars-interpreter

      # Topics consumed from the gate and produced for downstream services.
      - KAFKA_TOPIC_SENSORS_RAW=simulator.sensors.raw
      - KAFKA_TOPIC_TELEMETRY_RAW=simulator.telemetry.raw
      - KAFKA_TOPIC_COMMON=mars.common-data-records

      # Path to the common JSON schema used to validate/shape outbound records.
      - COMMON_SCHEMA_PATH=/app/config/common-data-record.schema.json
    ports:
      # Optional: expose an HTTP port (health/metrics) for the interpreter.
      - "3002:3002"
    volumes:
      # Mount the common data model defined at ./format.json into the container.
      - ./format.json:/app/config/common-data-record.schema.json:ro
    networks:
      - mars-net

  # Rules Service component: consumes normalized data, evaluates rules, controls actuators
  rules-service:
    build:
      context: ./rules-service
      dockerfile: Dockerfile
    container_name: mars-rules-service
    depends_on:
      - kafka
      - simulator
    environment:
      - NODE_ENV=production
      - DB_PATH=data/database.sqlite
      - KAFKA_BROKER=kafka:9092
      - SIMULATOR_URL=http://simulator:8080
      - PORT=4000
    ports:
      - "4000:4000"
    volumes:
      - rules-data:/app/data
    networks:
      - mars-net

  # Simulator component
  simulator:
    image: mars-iot-simulator:multiarch_v1
    container_name: mars-simulator
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://simulator:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mars-net

networks:
  mars-net:
    driver: bridge

volumes:
  rules-data:

